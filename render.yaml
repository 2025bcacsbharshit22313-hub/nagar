services:
  - type: web
    name: ai-medical-diagnostics
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in the Render dashboard – never commit the real value